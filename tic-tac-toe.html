<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            margin: 20px auto;
            background-color: #333;
            padding: 5px;
            border-radius: 10px;
        }
        
        .cell {
            background-color: white;
            border: none;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        .cell:hover {
            background-color: #e0e0e0;
        }
        
        .cell:disabled {
            cursor: not-allowed;
            background-color: #f9f9f9;
        }
        
        .game-info {
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .reset-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .reset-btn:hover {
            background-color: #0056b3;
        }
        
        .winner {
            color: #28a745;
        }
        
        .draw {
            color: #ffc107;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Tic Tac Toe</h1>
        <div class="game-info" id="gameInfo">Player X's turn</div>
        <div class="game-board" id="gameBoard">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>
        <button class="reset-btn" id="resetBtn">Reset Game</button>
    </div>

    <script>
        class TicTacToe {
            constructor() {
                this.board = Array(9).fill('');
                this.currentPlayer = 'X';
                this.gameActive = true;
                this.cells = document.querySelectorAll('.cell');
                this.gameInfo = document.getElementById('gameInfo');
                this.resetBtn = document.getElementById('resetBtn');
                
                this.winningConditions = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8],
                    [0, 3, 6], [1, 4, 7], [2, 5, 8],
                    [0, 4, 8], [2, 4, 6]
                ];
                
                this.initializeGame();
            }
            
            initializeGame() {
                this.cells.forEach((cell, index) => {
                    cell.addEventListener('click', () => this.makeMove(index));
                });
                this.resetBtn.addEventListener('click', () => this.resetGame());
            }
            
            makeMove(index) {
                if (this.board[index] !== '' || !this.gameActive) return;
                
                this.board[index] = this.currentPlayer;
                this.cells[index].textContent = this.currentPlayer;
                this.cells[index].disabled = true;
                
                if (this.checkWinner()) {
                    this.gameInfo.textContent = `Player ${this.currentPlayer} wins!`;
                    this.gameInfo.className = 'game-info winner';
                    this.gameActive = false;
                    this.disableAllCells();
                } else if (this.checkDraw()) {
                    this.gameInfo.textContent = "It's a draw!";
                    this.gameInfo.className = 'game-info draw';
                    this.gameActive = false;
                } else {
                    this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                    this.gameInfo.textContent = `Player ${this.currentPlayer}'s turn`;
                }
            }
            
            checkWinner() {
                return this.winningConditions.some(condition => {
                    return condition.every(index => {
                        return this.board[index] === this.currentPlayer;
                    });
                });
            }
            
            checkDraw() {
                return this.board.every(cell => cell !== '');
            }
            
            disableAllCells() {
                this.cells.forEach(cell => {
                    cell.disabled = true;
                });
            }
            
            resetGame() {
                this.board = Array(9).fill('');
                this.currentPlayer = 'X';
                this.gameActive = true;
                this.gameInfo.textContent = "Player X's turn";
                this.gameInfo.className = 'game-info';
                
                this.cells.forEach(cell => {
                    cell.textContent = '';
                    cell.disabled = false;
                });
            }
        }
        
        const game = new TicTacToe();
    </script>
</body>
</html>
